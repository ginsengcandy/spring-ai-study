name: Weekly Research Notes
description:  『이것이 Spring AI다』 8주 완성 스파르타 스터디 - Research Notes
title: "[Chapter x] Research Notes"
labels: ["research"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        # 📚 Research Notes 제출
        
        - 기본 제출은 텍스트 작성
        - 대용량 파일 업로드는 금지
        - 필요 시 Google Drive / Notion / GitHub 링크 제출

  - type: input
    id: chapter
    attributes:
      label: 📚 Chapter
      placeholder: "예: Chapter 1"
    validations:
      required: true

  - type: input
    id: student
    attributes:
      label: 🙋 이름
      placeholder: "이름을 입력하세요"
    validations:
      required: true

  - type: textarea
    id: topic
    attributes:
      label: 🔎 학습 주제
      description: 학습힌 주제를 한 문장으로 명확히 작성하세요.
      placeholder: "예: Spring AI의 RAG 구조와 VectorDB 동작 방식 분석"
    validations:
      required: true

  - type: textarea
    id: content
    attributes:
      label: 🧠 학습 내용 정리
      description: |
        아래 형식을 참고해서 자유롭게 작성하세요.
        
        - 핵심 개념 정리
        - 동작 흐름 분석
        - 코드/구조 이해
        - 개인 해석
      placeholder: |
        ## 1. 핵심 개념
        
        ## 2. 동작 흐름
        
        ## 3. 기술적 분석
        
        ## 4. 나의 이해 및 정리
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 📖 참고 자료
      description: 참고한 자료의 출처를 명시해주세요.
      placeholder: |
        - 공식 문서: https://...
        - 논문: 제목 / 저자
        - 블로그: https://...
    validations:
      required: false

  - type: textarea
    id: insight
    attributes:
      label: 💡 실무 적용 또는 확장 아이디어
      description: 이 내용을 어떻게 실무나 프로젝트에 적용할 수 있을지 작성해보세요.
      placeholder: |
        - 프로젝트 적용 방안
        - 개선 아이디어
        - 추가 실험 계획
    validations:
      required: false

  - type: input
    id: external_link
    attributes:
      label: 🔗 추가 자료 링크 (선택)
      description: 코드, 다이어그램, 대용량 파일은 외부 링크로 제출하세요.
      placeholder: "https://drive.google.com/... 또는 https://github.com/..."
    validations:
      required: false